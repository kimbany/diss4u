<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Diss4U 🎤 공유된 노래</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Black+Han+Sans&family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-1822729436086485" crossorigin="anonymous" id="adsbygoogle-js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  :root { --bg:#0d0d10; --card:#1a1a1f; --lime:#d4ff3a; --cyan:#a3e5ff; --text:#fff; --dim:#8a8a99; --border:#2a2a32; }
  body { background:var(--bg); color:var(--text); font-family:'Pretendard',-apple-system,sans-serif; min-height:100vh; line-height:1.5; }
  .wrap { max-width:480px; margin:0 auto; padding:24px 20px 60px; }
  .brand { font-family:'Black Han Sans',sans-serif; font-size:22px; text-align:center; margin:16px 0 24px; }
  .brand small { display:block; font-family:'Pretendard'; font-size:11px; color:var(--dim); letter-spacing:2px; font-weight:600; }
  .hero { background:linear-gradient(135deg,var(--lime) 0%,var(--cyan) 100%); border-radius:24px; padding:24px; color:#1a1a1f; margin-bottom:16px; position:relative; overflow:hidden; }
  .hero::before { content:'🎵'; position:absolute; right:18px; top:14px; font-size:54px; opacity:.3; }
  .label { font-size:11px; font-weight:700; letter-spacing:1.5px; opacity:.6; text-transform:uppercase; margin-bottom:6px; }
  .title { font-family:'Black Han Sans',sans-serif; font-size:24px; line-height:1.2; margin-bottom:14px; }
  .meta { display:flex; gap:6px; flex-wrap:wrap; }
  .tag { background:rgba(26,26,31,.15); color:#1a1a1f; padding:4px 10px; border-radius:999px; font-size:11px; font-weight:600; }
  .player { background:var(--card); border:1px solid var(--border); border-radius:18px; padding:16px; margin-bottom:16px; }
  .player audio { width:100%; }
  .sec { font-size:13px; font-weight:600; color:var(--dim); margin-bottom:10px; }
  .lyrics { background:var(--card); border:1px solid var(--border); border-radius:18px; padding:20px; font-size:15px; line-height:1.9; white-space:pre-wrap; margin-bottom:24px; }
  .cta { display:block; text-align:center; background:var(--lime); color:#1a1a1f; font-weight:800; font-size:16px; padding:16px; border-radius:18px; text-decoration:none; box-shadow:0 8px 30px rgba(212,255,58,.3); }
  .state { text-align:center; padding:80px 20px; color:var(--dim); }
  .spin { width:48px; height:48px; border-radius:50%; border:4px solid var(--border); border-top-color:var(--lime); margin:0 auto 16px; animation:s 1s linear infinite; }
  @keyframes s { to { transform:rotate(360deg); } }
  .site-footer { max-width:480px; margin:32px auto 24px; padding:20px 20px 0; border-top:1px solid var(--border); text-align:center; color:#5a5a65; font-size:11px; line-height:1.7; }
  .site-footer-name { font-weight:700; font-size:13px; color:var(--dim); margin-bottom:6px; }
  .site-footer-line { word-break:keep-all; }
  .site-footer a { color:var(--dim); text-decoration:none; }
  .site-footer a:hover { color:var(--lime); }
  .ad-slot { margin:24px 0; }
  .ad-slot .ad-label { font-size:10px; color:#5a5a65; text-align:center; letter-spacing:1px; margin-bottom:4px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">Diss4U<small>This Song 4 U · AI</small></div>
  <div id="content">
    <div class="state"><div class="spin"></div>노래 불러오는 중...</div>
  </div>
</div>

<footer class="site-footer">
  <div class="site-footer-name">Diss4U</div>
  <div class="site-footer-line">대표 김바니 · 사업자등록번호 228-70-00668</div>
  <div class="site-footer-line">상호 bodyhack · 통신판매업신고 제2024-경기김포-8528호</div>
  <div class="site-footer-line">주소 경기도 김포시 전원로 27, 102동 303호</div>
  <div class="site-footer-line">문의 <a href="mailto:imenupp@gmail.com">imenupp@gmail.com</a></div>
  <div class="site-footer-line" style="margin-top:6px;"><a href="privacy.html">개인정보처리방침</a> · <a href="refund.html">환불정책</a></div>
</footer>

<script>
const firebaseConfig = {
  apiKey: "AIzaSyAD2galkT_bYbtmOG6TSVIBdlLtByVbXZU",
  authDomain: "chinolsong.firebaseapp.com",
  projectId: "chinolsong",
  storageBucket: "chinolsong.firebasestorage.app",
  messagingSenderId: "167000575928",
  appId: "1:167000575928:web:b030d86b87f15ae2c9894d"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();

// === 구글 애드센스 (index.html과 동일한 게시자 ID 사용) ===
const ADSENSE_CLIENT = 'ca-pub-1822729436086485';
const AD_SLOT_SHARE = '';             // 공유 페이지 광고 슬롯 ID (애드센스 승인 후 입력)
function adsEnabled(){ return /^ca-pub-\d+$/.test(ADSENSE_CLIENT); }
function injectAdsenseLoader(){
  if(!adsEnabled() || document.getElementById('adsbygoogle-js')) return;
  const s=document.createElement('script');
  s.id='adsbygoogle-js'; s.async=true; s.crossOrigin='anonymous';
  s.src='https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client='+ADSENSE_CLIENT;
  document.head.appendChild(s);
}
function mountAd(containerId, slot){
  if(!adsEnabled() || !slot) return;
  const c=document.getElementById(containerId);
  if(!c || c.dataset.loaded) return;
  c.dataset.loaded='1';
  c.innerHTML = '<div class="ad-label">광고</div>'
    + '<ins class="adsbygoogle" style="display:block" data-ad-client="'+ADSENSE_CLIENT+'" data-ad-slot="'+slot+'" data-ad-format="auto" data-full-width-responsive="true"></ins>';
  try{ (window.adsbygoogle=window.adsbygoogle||[]).push({}); }catch(e){}
}
injectAdsenseLoader();

const GENRE_NAMES = { hiphop:'힙합', ballad:'발라드', trot:'트로트', kpop:'K-pop', rock:'락', kids:'동요', lofi:'로파이', random:'랜덤' };

function esc(s){ const d=document.createElement('div'); d.textContent=s==null?'':s; return d.innerHTML; }
function appHomeUrl(){ const dir=location.origin+location.pathname.substring(0,location.pathname.lastIndexOf('/')+1); const ref=new URLSearchParams(location.search).get('ref'); return dir+'index.html'+(ref?('?ref='+encodeURIComponent(ref)):''); }

async function load() {
  const content = document.getElementById('content');
  const id = new URLSearchParams(location.search).get('id');
  if (!id) { content.innerHTML = '<div class="state">잘못된 링크예요 😅</div>'; return; }
  try {
    const doc = await db.collection('songs').doc(id).get();
    if (!doc.exists) { content.innerHTML = '<div class="state">노래를 찾을 수 없어요.<br>삭제됐거나 잘못된 링크예요.</div>'; return; }
    const s = doc.data();
    const genreName = GENRE_NAMES[s.genre] || s.genre || '';
    content.innerHTML = `
      <div class="hero">
        <div class="label">🎤 누군가 당신을 위해 만든 노래</div>
        <div class="title">${esc(s.title)}</div>
        <div class="meta">
          <span class="tag">${esc(genreName)}</span>
          <span class="tag">🎯 ${esc(s.name)}</span>
        </div>
      </div>
      ${s.audioUrl ? `<div class="player"><audio controls autoplay src="${esc(s.audioUrl)}"></audio></div>` : '<div class="player" style="color:var(--dim);font-size:13px;">오디오를 불러올 수 없어요 (링크 만료)</div>'}
      <div class="sec">가사</div>
      <div class="lyrics">${esc(s.lyrics)}</div>
      <a class="cta" href="${appHomeUrl()}">🎤 나도 Diss4U로 복수하기</a>
      <div class="ad-slot" id="adShare"></div>
    `;
    mountAd('adShare', AD_SLOT_SHARE);
  } catch (e) {
    console.warn(e);
    content.innerHTML = '<div class="state">불러오기 실패 😢<br>잠시 후 다시 시도해주세요.</div>';
  }
}
load();
</script>
</body>
</html>
