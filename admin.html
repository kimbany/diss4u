<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<link rel="icon" type="image/png" href="simple.png?v=1" />
<link rel="apple-touch-icon" href="simple.png?v=1" />
<meta name="robots" content="noindex, nofollow" />
<title>Diss4U 관리자</title>
<style>
  :root {
    --bg: #0e0f13; --panel: #171922; --panel2: #1f2230;
    --line: #2a2e3d; --text: #e9ecf4; --dim: #9aa1b2;
    --accent: #d4ff3a; --accent2: #7c5cff; --danger: #ff5a6a; --ok: #4cd07d;
  }
  * { box-sizing: border-box; }
  body { margin: 0; background: var(--bg); color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Apple SD Gothic Neo", "Noto Sans KR", sans-serif; }
  a { color: var(--accent2); }
  .wrap { max-width: 1400px; margin: 0 auto; padding: 24px 20px 80px; }
  td.actions { text-align: right; white-space: nowrap; }
  td.actions .btn { margin-left: 6px; }
  h1 { font-size: 20px; margin: 0; }
  .brand { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
  .brand .tag { font-size: 12px; color: var(--dim); border: 1px solid var(--line); padding: 2px 8px; border-radius: 999px; }
  .card { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 18px; margin-bottom: 18px; }
  .card h2 { font-size: 15px; margin: 0 0 14px; color: var(--accent); }
  label { display: block; font-size: 12px; color: var(--dim); margin: 0 0 6px; }
  input { width: 100%; background: var(--panel2); border: 1px solid var(--line); color: var(--text);
    border-radius: 10px; padding: 11px 12px; font-size: 14px; outline: none; }
  input:focus { border-color: var(--accent2); }
  .row { display: flex; gap: 12px; flex-wrap: wrap; }
  .row > .col { flex: 1 1 180px; margin-bottom: 12px; }
  .btn { display: inline-flex; align-items: center; justify-content: center; gap: 6px;
    background: var(--accent); color: #11131a; border: none; border-radius: 10px;
    padding: 10px 16px; font-size: 14px; font-weight: 700; cursor: pointer; }
  .btn:disabled { opacity: .5; cursor: default; }
  .btn.secondary { background: var(--panel2); color: var(--text); border: 1px solid var(--line); }
  .btn.small { padding: 6px 12px; font-size: 13px; }
  .btn.danger { background: transparent; color: var(--danger); border: 1px solid var(--danger); }
  .msg { font-size: 13px; margin-top: 10px; min-height: 18px; }
  .msg.err { color: var(--danger); } .msg.ok { color: var(--ok); }
  .topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 18px; }
  .topbar .who { font-size: 13px; color: var(--dim); }
  .hidden { display: none !important; }
  .toolbar { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; flex-wrap: wrap; }
  .search { max-width: 280px; }
  .stat { font-size: 13px; color: var(--dim); }
  .table-scroll { overflow-x: auto; border: 1px solid var(--line); border-radius: 12px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; min-width: 760px; }
  th, td { padding: 11px 12px; text-align: left; border-bottom: 1px solid var(--line); white-space: nowrap; }
  th { color: var(--dim); font-weight: 600; font-size: 12px; background: var(--panel2); position: sticky; top: 0; }
  tr:last-child td { border-bottom: none; }
  td.num { text-align: right; font-variant-numeric: tabular-nums; }
  .email { font-weight: 600; }
  .sub { color: var(--dim); font-size: 11px; }
  .pill { display: inline-block; padding: 1px 7px; border-radius: 999px; font-size: 11px; border: 1px solid var(--line); color: var(--dim); }
  .free { color: var(--accent); } .paid { color: var(--accent2); }
  .pill.banned { color: var(--danger); border-color: var(--danger); }
  .ledger-row { display: flex; justify-content: space-between; align-items: center; padding: 7px 0; border-bottom: 1px solid var(--line); font-size: 13px; }
  .ledger-row:last-child { border-bottom: none; }
  .ledger-amt.plus { color: var(--accent); font-weight: 700; }
  .ledger-amt.minus { color: var(--danger); font-weight: 700; }
  @media (max-width: 768px) {
    .wrap { padding: 14px 10px 60px; }
    h1 { font-size: 18px; }
    .card { padding: 14px; border-radius: 12px; margin-bottom: 14px; }
    .card h2 { font-size: 14px; margin-bottom: 12px; }
    .topbar { margin-bottom: 14px; }
    .tabs { gap: 0; }
    .tab { flex: 1; padding: 10px 8px; font-size: 13px; text-align: center; }
    .toolbar { gap: 8px; }
    .toolbar .btn { padding: 8px 12px; font-size: 12px; }
    .search { max-width: 100%; }
    input[type="date"] { max-width: 140px; }
    table { min-width: 640px; font-size: 12px; }
    th, td { padding: 9px 8px; }
    td.actions { white-space: normal; text-align: left; }
    td.actions .btn { margin: 3px 4px 3px 0; padding: 6px 10px; font-size: 12px; }
    .modal { padding: 14px; }
    .sales-summary { gap: 12px; padding: 8px 0 12px; font-size: 13px; }
    .sales-summary span b { font-size: 14px; }
  }
  /* 결제/환불 모달 */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.6); display: flex;
    align-items: flex-start; justify-content: center; padding: 40px 16px; z-index: 50; overflow-y: auto; }
  .modal { background: var(--panel); border: 1px solid var(--line); border-radius: 14px; padding: 18px; width: 100%; max-width: 520px; }
  .modal-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; gap: 12px; }
  .modal-head h2 { font-size: 15px; margin: 0; color: var(--accent); word-break: break-all; }
  .pay-item { border: 1px solid var(--line); border-radius: 12px; padding: 13px; margin-bottom: 10px; }
  .pay-item .top { display: flex; justify-content: space-between; align-items: baseline; margin-bottom: 4px; gap: 8px; }
  .pay-item .amt { font-size: 15px; font-weight: 800; }
  .pay-item .meta { font-size: 11px; color: var(--dim); word-break: break-all; }
  .refbox { margin-top: 10px; display: flex; gap: 6px; }
  .refbox input { flex: 1; }
  .statpill { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 999px; border: 1px solid var(--line); white-space: nowrap; }
  .statpill.completed { color: var(--accent); border-color: var(--accent); }
  .statpill.refunded { color: var(--danger); border-color: var(--danger); }
  .statpill.partial_refunded { color: #ffb35a; border-color: #ffb35a; }
  /* 탭 */
  .tabs { display: flex; gap: 4px; margin-bottom: 18px; border-bottom: 1px solid var(--line); flex-wrap: wrap; }
  .tab { background: transparent; color: var(--dim); border: none; border-bottom: 2px solid transparent;
    padding: 10px 16px; font-size: 14px; font-weight: 600; cursor: pointer; margin-bottom: -1px; }
  .tab:hover { color: var(--text); }
  .tab.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-panel { display: none; }
  .tab-panel.active { display: block; }
  /* 매출 */
  .sales-summary { display: flex; gap: 18px; flex-wrap: wrap; padding: 10px 0 14px; font-size: 14px; color: var(--text); }
  .sales-summary span b { font-size: 16px; margin-left: 4px; }
  input[type="date"] { max-width: 180px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">
    <h1>Diss4U 관리자</h1>
    <span class="tag">admin</span>
  </div>

  <!-- 로그인 -->
  <div id="loginCard" class="card" style="max-width:380px;">
    <h2>로그인</h2>
    <label for="username">아이디</label>
    <input id="username" autocomplete="username" />
    <div style="height:12px"></div>
    <label for="password">비밀번호</label>
    <input id="password" type="password" autocomplete="current-password" />
    <div style="height:16px"></div>
    <button class="btn" id="loginBtn" style="width:100%">로그인</button>
    <div class="msg" id="loginMsg"></div>
  </div>

  <!-- 대시보드 -->
  <div id="dash" class="hidden">
    <div class="topbar">
      <div class="who" id="whoami"></div>
      <button class="btn secondary small" id="logoutBtn">로그아웃</button>
    </div>

    <!-- 탭 -->
    <div class="tabs">
      <button class="tab active" data-tab="customers">👥 고객관리</button>
      <button class="tab" data-tab="sales">💰 매출</button>
      <button class="tab" data-tab="settings">⚙️ 설정</button>
    </div>

    <!-- 고객관리 탭 -->
    <div class="tab-panel active" data-panel="customers">
      <!-- 신고 들어온 곡 -->
      <div class="card">
        <h2>🚩 신고 들어온 곡</h2>
        <div class="toolbar">
          <button class="btn secondary small" id="reloadReports">새로고침</button>
          <span class="stat" id="reportStat"></span>
        </div>
        <div id="reportList"><div class="msg" style="color:var(--dim)">불러오는 중…</div></div>
      </div>

      <!-- 회원 관리 -->
      <div class="card">
        <h2>회원 관리</h2>
        <div class="toolbar">
          <input class="search" id="search" placeholder="이메일 검색…" />
          <button class="btn secondary small" id="reloadBtn">새로고침</button>
          <span class="stat" id="memberStat"></span>
        </div>
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th>구글 아이디</th>
                <th>가입 일자</th>
                <th style="text-align:right">총 크레딧</th>
                <th style="text-align:right">가용 가능</th>
                <th style="text-align:right">무료 보유</th>
                <th style="text-align:right">충전(누적)</th>
                <th style="text-align:right">충전 가용</th>
                <th></th>
              </tr>
            </thead>
            <tbody id="memberRows">
              <tr><td colspan="8" style="color:var(--dim)">불러오는 중…</td></tr>
            </tbody>
          </table>
        </div>
        <div class="msg" id="memberMsg"></div>
      </div>
    </div>

    <!-- 매출 탭 -->
    <div class="tab-panel" data-panel="sales">
      <div class="card">
        <h2>💰 매출</h2>
        <div class="toolbar">
          <label for="salesFrom" style="margin:0;">시작</label>
          <input type="date" id="salesFrom" />
          <label for="salesTo" style="margin:0;">종료</label>
          <input type="date" id="salesTo" />
          <button class="btn small" id="loadSalesBtn">조회</button>
          <button class="btn secondary small" id="salesTodayBtn">오늘</button>
          <button class="btn secondary small" id="sales7Btn">최근 7일</button>
          <button class="btn secondary small" id="sales30Btn">최근 30일</button>
          <span class="stat" id="salesStat"></span>
        </div>
        <div class="sales-summary" id="salesSummary"></div>
        <div class="table-scroll">
          <table>
            <thead>
              <tr>
                <th>날짜</th>
                <th>시간</th>
                <th>고객(이메일/UID)</th>
                <th style="text-align:right">금액</th>
                <th style="text-align:right">크레딧</th>
                <th>상태</th>
              </tr>
            </thead>
            <tbody id="salesRows">
              <tr><td colspan="6" style="color:var(--dim)">날짜를 선택하고 '조회'를 눌러주세요</td></tr>
            </tbody>
          </table>
        </div>
        <div class="msg" id="salesMsg"></div>
      </div>
    </div>

    <!-- 설정 탭 -->
    <div class="tab-panel" data-panel="settings">
      <div class="card" style="max-width:420px;">
        <h2>관리자 비밀번호 변경</h2>
        <label for="curPw">현재 비밀번호</label>
        <input id="curPw" type="password" autocomplete="current-password" />
        <div style="height:12px"></div>
        <label for="newPw">새 비밀번호 (8자 이상)</label>
        <input id="newPw" type="password" autocomplete="new-password" />
        <div style="height:12px"></div>
        <label for="newPw2">새 비밀번호 확인</label>
        <input id="newPw2" type="password" autocomplete="new-password" />
        <div style="height:16px"></div>
        <button class="btn" id="pwBtn">비밀번호 변경</button>
        <div class="msg" id="pwMsg"></div>
      </div>
    </div>
  </div>
</div>

<!-- 결제/환불 모달 -->
<div id="payModal" class="modal-overlay hidden">
  <div class="modal">
    <div class="modal-head">
      <h2 id="payTitle">결제 내역</h2>
      <button class="btn secondary small" id="payClose">닫기</button>
    </div>
    <div id="payBody"></div>
  </div>
</div>

<script>
const API = (function () {
  // index.html과 동일한 프록시. ?api= 로 임시 변경 가능(개발용).
  const q = new URLSearchParams(location.search).get('api');
  if (q) return q.replace(/\/$/, '');
  return 'https://chinolsong-proxy.onrender.com';
})();

const TOKEN_KEY = 'diss4u_admin_token';
let TOKEN = sessionStorage.getItem(TOKEN_KEY) || '';
let ADMIN_USER = sessionStorage.getItem('diss4u_admin_user') || '';
let MEMBERS = [];

const $ = (id) => document.getElementById(id);
function setMsg(el, text, kind) { el.textContent = text || ''; el.className = 'msg' + (kind ? ' ' + kind : ''); }

async function api(path, opts = {}) {
  const headers = Object.assign({ 'Content-Type': 'application/json' }, opts.headers || {});
  if (TOKEN) headers['X-Admin-Token'] = TOKEN;
  const r = await fetch(API + path, { method: opts.method || 'GET', headers, body: opts.body });
  let data = {};
  try { data = await r.json(); } catch (e) {}
  return { ok: r.ok, status: r.status, data };
}

function showDash() {
  $('loginCard').classList.add('hidden');
  $('dash').classList.remove('hidden');
  $('whoami').textContent = '관리자: ' + (ADMIN_USER || '');
  loadMembers();
  loadReports();
}
function showLogin() {
  $('dash').classList.add('hidden');
  $('loginCard').classList.remove('hidden');
}

// ===== 로그인 =====
async function doLogin() {
  const username = $('username').value.trim();
  const password = $('password').value;
  if (!username || !password) { setMsg($('loginMsg'), '아이디와 비밀번호를 입력하세요', 'err'); return; }
  $('loginBtn').disabled = true; setMsg($('loginMsg'), '확인 중…');
  try {
    const r = await api('/admin/login', { method: 'POST', body: JSON.stringify({ username, password }) });
    if (!r.ok || !r.data.ok) { setMsg($('loginMsg'), r.data.message || '로그인 실패', 'err'); return; }
    TOKEN = r.data.token; ADMIN_USER = r.data.username || username;
    sessionStorage.setItem(TOKEN_KEY, TOKEN);
    sessionStorage.setItem('diss4u_admin_user', ADMIN_USER);
    $('password').value = '';
    showDash();
  } catch (e) {
    setMsg($('loginMsg'), '서버에 연결할 수 없어요', 'err');
  } finally { $('loginBtn').disabled = false; }
}

function logout() {
  TOKEN = ''; ADMIN_USER = '';
  sessionStorage.removeItem(TOKEN_KEY);
  sessionStorage.removeItem('diss4u_admin_user');
  showLogin();
}

// ===== 회원 목록 =====
function fmtDate(s) {
  if (!s) return '-';
  const d = new Date(s);
  if (isNaN(d)) return s;
  const p = (n) => String(n).padStart(2, '0');
  return d.getFullYear() + '-' + p(d.getMonth() + 1) + '-' + p(d.getDate()) + ' ' + p(d.getHours()) + ':' + p(d.getMinutes());
}

function renderMembers() {
  const q = $('search').value.trim().toLowerCase();
  const rows = MEMBERS.filter(m => !q || (m.email || '').toLowerCase().includes(q));
  $('memberStat').textContent = `총 ${MEMBERS.length}명` + (q ? ` · 검색 ${rows.length}명` : '');
  if (!rows.length) {
    $('memberRows').innerHTML = '<tr><td colspan="8" style="color:var(--dim)">회원이 없어요</td></tr>';
    return;
  }
  $('memberRows').innerHTML = rows.map(m => {
    const em = escapeHtml(m.email || '');
    const banned = !!m.disabled;
    const banBtn = banned
      ? `<button class="btn small" data-act="restore" data-uid="${m.uid}" data-email="${em}" style="margin-left:6px;">복구</button>`
      : `<button class="btn small danger" data-act="ban" data-uid="${m.uid}" data-email="${em}" style="margin-left:6px;">차단</button>`;
    return `
    <tr id="m-${m.uid}"${banned ? ' style="opacity:.6"' : ''}>
      <td><div class="email">${escapeHtml(m.email || '(이메일 없음)')}${banned ? ' <span class="pill banned">차단됨</span>' : ''}</div><div class="sub">${m.uid}</div></td>
      <td>${fmtDate(m.signupAt)}</td>
      <td class="num">${m.totalCredits}</td>
      <td class="num"><b>${m.availableCredits}</b></td>
      <td class="num free">${m.freeCredits}</td>
      <td class="num paid">${m.paidGranted}</td>
      <td class="num paid">${m.paidCredits}</td>
      <td class="actions">
        <button class="btn small secondary" data-act="songs" data-uid="${m.uid}" data-email="${em}">제작물</button>
        <button class="btn small secondary" data-act="ledger" data-uid="${m.uid}" data-email="${em}" style="margin-left:6px;">크레딧 내역</button>
        <button class="btn small" data-act="grant" data-uid="${m.uid}" data-email="${em}" style="margin-left:6px;">크레딧 증정</button>
        <button class="btn small secondary" data-act="pay" data-uid="${m.uid}" data-email="${em}" style="margin-left:6px;">결제/환불</button>
        ${banBtn}
      </td>
    </tr>`;
  }).join('');
  document.querySelectorAll('#memberRows button[data-uid]').forEach(b => {
    b.addEventListener('click', () => {
      const uid = b.getAttribute('data-uid'), email = b.getAttribute('data-email');
      const act = b.getAttribute('data-act');
      if (act === 'pay') openPayments(uid, email);
      else if (act === 'songs') toggleSongs(uid, email);
      else if (act === 'ledger') toggleLedger(uid, email);
      else if (act === 'ban') banMember(uid, email);
      else if (act === 'restore') restoreMember(uid, email);
      else grant(uid, email);
    });
  });
}

function escapeHtml(s) {
  return String(s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

async function loadMembers() {
  setMsg($('memberMsg'), '');
  $('memberRows').innerHTML = '<tr><td colspan="8" style="color:var(--dim)">불러오는 중…</td></tr>';
  const r = await api('/admin/users');
  if (r.status === 401) { logout(); setMsg($('loginMsg'), '세션이 만료됐어요. 다시 로그인하세요', 'err'); return; }
  if (!r.ok || !r.data.ok) { setMsg($('memberMsg'), r.data.message || '회원 목록을 불러오지 못했어요', 'err'); $('memberRows').innerHTML = ''; return; }
  MEMBERS = r.data.users || [];
  renderMembers();
}

// ===== 신고/제작물(콘텐츠 모더레이션) =====
async function loadReports() {
  const box = $('reportList');
  const r = await api('/admin/reports');
  if (r.status === 401) { logout(); return; }
  if (!r.ok || !r.data.ok) { box.innerHTML = '<div class="msg err">' + escapeHtml((r.data && r.data.message) || '신고 목록 조회 실패') + '</div>'; return; }
  renderReports(r.data.reports || []);
}

function renderReports(reports) {
  $('reportStat').textContent = reports.length ? ('대기 ' + reports.length + '건') : '';
  if (!reports.length) { $('reportList').innerHTML = '<div class="msg" style="color:var(--dim)">대기중인 신고가 없어요 🎉</div>'; return; }
  const bySong = {};
  reports.forEach(rp => {
    const g = bySong[rp.songId] || (bySong[rp.songId] = { songId: rp.songId, songTitle: rp.songTitle, count: 0, reasons: [], latest: rp.createdAt });
    g.count++;
    if (rp.reason) g.reasons.push(rp.reason);
    if ((rp.createdAt || '') > (g.latest || '')) g.latest = rp.createdAt;
  });
  const groups = Object.values(bySong).sort((a, b) => (b.latest || '').localeCompare(a.latest || ''));
  $('reportList').innerHTML = groups.map(g => {
    const reasons = g.reasons.length ? '<div class="meta" style="margin-top:4px;">사유: ' + escapeHtml(g.reasons.slice(0, 3).join(' / ')) + '</div>' : '';
    return '<div class="pay-item">'
      + '<div class="top"><span class="amt" style="font-size:14px;">' + escapeHtml(g.songTitle || '(제목 없음)') + '</span>'
      + '<span class="statpill" style="color:#ffb35a;border-color:#ffb35a;">신고 ' + g.count + '건</span></div>'
      + '<div class="meta">' + fmtDate(g.latest) + ' · 곡ID ' + escapeHtml(g.songId) + '</div>'
      + reasons
      + '<div class="refbox" style="margin-top:8px;">'
      + '<a class="btn small secondary" href="share.html?id=' + encodeURIComponent(g.songId) + '" target="_blank" style="text-decoration:none;">듣기</a>'
      + '<button class="btn danger small" data-block="' + g.songId + '">차단</button>'
      + '<button class="btn small secondary" data-dismiss="' + g.songId + '">무시</button>'
      + '</div></div>';
  }).join('');
  $('reportList').querySelectorAll('button[data-block]').forEach(b => b.addEventListener('click', () => blockSong(b.getAttribute('data-block'), true, b)));
  $('reportList').querySelectorAll('button[data-dismiss]').forEach(b => b.addEventListener('click', () => dismissReports(b.getAttribute('data-dismiss'), b)));
}

async function toggleSongs(uid, email) {
  const existing = document.getElementById('songs-' + uid);
  if (existing) { existing.remove(); return; }
  const mrow = document.getElementById('m-' + uid);
  if (!mrow) return;
  const tr = document.createElement('tr');
  tr.id = 'songs-' + uid;
  tr.innerHTML = '<td colspan="8" style="background:var(--panel2);"><div class="msg" style="color:var(--dim)">제작물 불러오는 중…</div></td>';
  mrow.after(tr);
  const r = await api('/admin/songs?uid=' + encodeURIComponent(uid));
  if (r.status === 401) { logout(); return; }
  const cell = tr.firstElementChild;
  if (!r.ok || !r.data.ok) { cell.innerHTML = '<div class="msg err">' + escapeHtml(r.data.message || '제작물 조회 실패') + '</div>'; return; }
  renderSongsInline(cell, r.data.songs || [], email);
}

function renderSongsInline(cell, songs, email) {
  if (!songs.length) { cell.innerHTML = '<div class="msg" style="color:var(--dim)">만든 곡이 없어요.</div>'; return; }
  cell.innerHTML = '<div style="font-size:12px;color:var(--dim);margin-bottom:8px;">' + escapeHtml(email || '') + ' · 제작물 ' + songs.length + '곡</div>'
    + songs.map(s => {
      const rep = s.reportCount > 0 ? '<span class="statpill" style="color:#ffb35a;border-color:#ffb35a;">신고 ' + s.reportCount + '</span> ' : '';
      const status = s.blocked ? '<span class="statpill refunded">차단됨</span>' : '<span class="statpill completed">정상</span>';
      return '<div class="pay-item">'
        + '<div class="top"><span class="amt" style="font-size:14px;">' + escapeHtml(s.title || '(제목 없음)') + '</span><span>' + rep + status + '</span></div>'
        + '<div class="meta">' + escapeHtml(s.genre || '') + ' · 🎯 ' + escapeHtml(s.name || '') + ' · ' + fmtDate(s.createdAt) + '</div>'
        + '<div class="refbox" style="margin-top:8px;">'
        + '<a class="btn small secondary" href="share.html?id=' + encodeURIComponent(s.id) + '" target="_blank" style="text-decoration:none;">듣기</a>'
        + (s.blocked
            ? '<button class="btn small secondary" data-unblock="' + s.id + '">차단 해제</button>'
            : '<button class="btn danger small" data-block="' + s.id + '">차단</button>')
        + '</div></div>';
    }).join('');
  cell.querySelectorAll('button[data-block]').forEach(b => b.addEventListener('click', () => blockSong(b.getAttribute('data-block'), true, b)));
  cell.querySelectorAll('button[data-unblock]').forEach(b => b.addEventListener('click', () => blockSong(b.getAttribute('data-unblock'), false, b)));
}

async function blockSong(songId, blocked, btn) {
  const action = blocked ? '차단' : '차단 해제';
  if (!confirm('이 곡을 ' + action + '할까요?' + (blocked ? '\n공유/재생이 즉시 막혀요.' : ''))) return;
  if (btn) btn.disabled = true;
  const r = await api('/admin/block-song', { method: 'POST', body: JSON.stringify({ songId, blocked }) });
  if (r.status === 401) { logout(); return; }
  if (!r.ok || !r.data.ok) { alert((r.data && r.data.message) || (action + ' 실패')); if (btn) btn.disabled = false; return; }
  loadReports();
  // 열려있는 제작물 목록 새로고침해서 상태 반영
  document.querySelectorAll('tr[id^="songs-"]').forEach(tr => {
    const uid = tr.id.replace('songs-', '');
    const m = MEMBERS.find(x => x.uid === uid);
    tr.remove();
    if (m) toggleSongs(uid, m.email);
  });
}

async function dismissReports(songId, btn) {
  if (!confirm('이 곡의 신고를 무시(처리완료)할까요?\n곡은 그대로 유지됩니다.')) return;
  if (btn) btn.disabled = true;
  const r = await api('/admin/block-song', { method: 'POST', body: JSON.stringify({ songId, blocked: false }) });
  if (r.status === 401) { logout(); return; }
  if (!r.ok || !r.data.ok) { alert((r.data && r.data.message) || '처리 실패'); if (btn) btn.disabled = false; return; }
  loadReports();
}

// ===== 회원별 크레딧 내역(원장) =====
var CREDIT_REASON = {
  signup: '🎁 가입 보너스', purchase: '💳 충전', referral: '🤝 친구 추천', share: '📤 공유 보상',
  admin: '🛠️ 관리자 증정', song: '🎵 곡 생성', refund: '↩️ 환불', withdrawal: '⚠️ 탈퇴(소멸)'
};
async function toggleLedger(uid, email) {
  const existing = document.getElementById('ledger-' + uid);
  if (existing) { existing.remove(); return; }
  const mrow = document.getElementById('m-' + uid);
  if (!mrow) return;
  const tr = document.createElement('tr');
  tr.id = 'ledger-' + uid;
  tr.innerHTML = '<td colspan="8" style="background:var(--panel2);"><div class="msg" style="color:var(--dim)">크레딧 내역 불러오는 중…</div></td>';
  mrow.after(tr);
  const r = await api('/admin/credit-history?uid=' + encodeURIComponent(uid));
  if (r.status === 401) { logout(); return; }
  const cell = tr.firstElementChild;
  if (!r.ok || !r.data.ok) { cell.innerHTML = '<div class="msg err">' + escapeHtml((r.data && r.data.message) || '크레딧 내역 조회 실패') + '</div>'; return; }
  const d = r.data, items = d.items || [];
  let html = '<div style="font-size:12px;color:var(--dim);margin-bottom:8px;">' + escapeHtml(email || '')
    + ' · 현재 잔액 <b style="color:var(--text)">' + d.credits + 'p</b> '
    + '(<span class="free">무료 ' + d.freeCredits + '</span> · <span class="paid">충전 ' + d.paidCredits + '</span>)</div>';
  if (!items.length) {
    const m = MEMBERS.find(x => x.uid === uid) || {};
    const freeGranted = Math.max(0, (m.totalCredits || 0) - (m.paidGranted || 0));
    const used = Math.max(0, (m.totalCredits || 0) - (m.availableCredits || 0));
    html += '<div class="msg" style="color:var(--dim);margin-bottom:8px;line-height:1.5;">건별 적립/사용 내역은 <b>내역 기록 기능 적용(최근) 이후 발생분</b>부터 표시돼요. 이전 활동은 기록이 없어 아래 <b>누적 합계</b>로만 보여드립니다.</div>';
    html += '<div class="ledger-row"><span>🎁 누적 무료 지급 <span style="color:var(--dim);font-size:11px;">(가입·보상·증정)</span></span><span class="ledger-amt plus">+' + freeGranted + 'p</span></div>';
    if ((m.paidGranted || 0) > 0) html += '<div class="ledger-row"><span>💳 누적 충전</span><span class="ledger-amt plus">+' + (m.paidGranted || 0) + 'p</span></div>';
    if (used > 0) html += '<div class="ledger-row"><span>🎵 사용(곡 생성 등) <span style="color:var(--dim);font-size:11px;">추정</span></span><span class="ledger-amt minus">-' + used + 'p</span></div>';
  }
  else {
    html += items.map(e => {
      const amt = e.amount || 0;
      const cls = amt >= 0 ? 'plus' : 'minus';
      const sign = amt > 0 ? '+' : '';
      const label = CREDIT_REASON[e.reason] || e.reason || e.type;
      return '<div class="ledger-row"><span>' + escapeHtml(label) + ' <span style="color:var(--dim);font-size:11px;">' + fmtDate(e.at) + '</span></span>'
        + '<span class="ledger-amt ' + cls + '">' + sign + amt + 'p</span></div>';
    }).join('');
  }
  cell.innerHTML = html;
}

// ===== 회원 차단 / 복구 =====
async function banMember(uid, email) {
  const label = email || uid;
  if (!confirm("'" + label + "' 님을 차단(탈퇴 처리)할까요?\n\n· 같은 구글 계정으로 다시 가입할 수 없게 됩니다.\n· 남아 있는 크레딧은 모두 소멸됩니다.\n\n잘못 차단한 경우 '복구'로 되돌릴 수 있어요(크레딧은 복원되지 않음).")) return;
  setMsg($('memberMsg'), '차단 처리 중…');
  const r = await api('/admin/ban', { method: 'POST', body: JSON.stringify({ uid }) });
  if (r.status === 401) { logout(); return; }
  if (!r.ok || !r.data.ok) { setMsg($('memberMsg'), (r.data && r.data.message) || '차단 실패', 'err'); return; }
  setMsg($('memberMsg'), '✓ ' + label + ' 님을 차단했어요 (소멸 크레딧 ' + (r.data.forfeited || 0) + 'p)', 'ok');
  loadMembers();
}
async function restoreMember(uid, email) {
  const label = email || uid;
  if (!confirm("'" + label + "' 님을 복구(차단 해제)할까요?\n\n· 다시 로그인할 수 있게 됩니다.\n· 소멸된 크레딧은 복원되지 않습니다.")) return;
  setMsg($('memberMsg'), '복구 처리 중…');
  const r = await api('/admin/restore', { method: 'POST', body: JSON.stringify({ uid }) });
  if (r.status === 401) { logout(); return; }
  if (!r.ok || !r.data.ok) { setMsg($('memberMsg'), (r.data && r.data.message) || '복구 실패', 'err'); return; }
  setMsg($('memberMsg'), '✓ ' + label + ' 님을 복구했어요', 'ok');
  loadMembers();
}

// ===== 크레딧 증정 =====
async function grant(uid, email) {
  const label = email || uid;
  const input = prompt(`'${label}' 님에게 증정할 크레딧(포인트)을 입력하세요.\n(무료 크레딧으로 적립됩니다)`, '10');
  if (input === null) return;
  const amount = Math.floor(Number(input));
  if (!Number.isFinite(amount) || amount <= 0) { alert('1 이상의 숫자를 입력하세요'); return; }
  setMsg($('memberMsg'), '증정 중…');
  const r = await api('/admin/grant', { method: 'POST', body: JSON.stringify({ uid, amount }) });
  if (r.status === 401) { logout(); return; }
  if (!r.ok || !r.data.ok) { setMsg($('memberMsg'), r.data.message || '증정 실패', 'err'); return; }
  setMsg($('memberMsg'), `✓ ${label} 님에게 ${r.data.granted}p 증정 완료 (현재 잔액 ${r.data.credits}p)`, 'ok');
  loadMembers();
}

// ===== 결제/환불 =====
function won(n) { return (Number(n) || 0).toLocaleString('ko-KR') + '원'; }

async function openPayments(uid, email) {
  $('payTitle').textContent = (email || uid) + ' · 결제 내역';
  $('payBody').innerHTML = '<div class="msg">불러오는 중…</div>';
  $('payModal').classList.remove('hidden');
  $('payModal').dataset.uid = uid;
  $('payModal').dataset.email = email || '';
  const r = await api('/admin/payments?uid=' + encodeURIComponent(uid));
  if (r.status === 401) { logout(); return; }
  if (!r.ok || !r.data.ok) { $('payBody').innerHTML = '<div class="msg err">' + escapeHtml(r.data.message || '조회 실패') + '</div>'; return; }
  renderPayments(r.data.payments || []);
}

function renderPayments(payments) {
  if (!payments.length) { $('payBody').innerHTML = '<div class="msg">결제 내역이 없어요.</div>'; return; }
  const label = { completed: '결제완료', refunded: '환불완료', partial_refunded: '부분환불' };
  $('payBody').innerHTML = payments.map(p => {
    const remaining = (p.amount || 0) - (p.refundedAmount || 0);
    let h = '<div class="pay-item" id="pi-' + p.paymentId + '">'
      + '<div class="top"><span class="amt">' + won(p.amount) + ' <span class="sub">· ' + p.credits + 'p</span></span>'
      + '<span class="statpill ' + p.status + '">' + (label[p.status] || p.status) + '</span></div>'
      + '<div class="meta">' + fmtDate(p.createdAt) + '<br>' + escapeHtml(p.paymentId) + '</div>';
    if (p.refundedAmount > 0) h += '<div class="meta" style="color:var(--danger);margin-top:4px;">환불됨 ' + won(p.refundedAmount) + ' (-' + p.refundedCredits + 'p) · 잔여 ' + won(remaining) + '</div>';
    if (remaining > 0) h += '<div class="refbox"><input type="number" min="1" max="' + remaining + '" placeholder="부분환불 금액(원), 비우면 전액" id="amt-' + p.paymentId + '"><button class="btn danger small" data-pid="' + p.paymentId + '" data-amt="' + p.amount + '" data-cr="' + p.credits + '">환불</button></div>';
    return h + '</div>';
  }).join('');
  $('payBody').querySelectorAll('button[data-pid]').forEach(b => {
    b.addEventListener('click', () => doRefund(b.getAttribute('data-pid'), Number(b.getAttribute('data-amt')), Number(b.getAttribute('data-cr'))));
  });
}

async function doRefund(paymentId, amount, credits) {
  const amtEl = $('amt-' + paymentId);
  const raw = amtEl ? amtEl.value.trim() : '';
  const refundAmount = raw ? Number(raw) : null;
  if (refundAmount !== null && (!Number.isFinite(refundAmount) || refundAmount <= 0)) { alert('환불 금액이 올바르지 않아요'); return; }
  const estCredits = refundAmount ? Math.round(credits * refundAmount / amount) : credits;
  const text = refundAmount ? (won(refundAmount) + ' 부분환불') : (won(amount) + ' 전액환불');
  if (!confirm(text + ' 할까요?\n예상 차감 크레딧: -' + estCredits + 'p\n되돌릴 수 없어요.')) return;
  const body = { paymentId, reason: '고객 환불 요청' };
  if (refundAmount) body.amount = refundAmount;
  const item = $('pi-' + paymentId);
  const r = await api('/refund-payment', { method: 'POST', body: JSON.stringify(body) });
  if (r.status === 401) { logout(); return; }
  if (!r.ok || !r.data.ok) {
    item.insertAdjacentHTML('beforeend', '<div class="msg err">' + escapeHtml(r.data.message || '환불 실패') + (r.data.detail ? ' (' + escapeHtml(r.data.detail) + ')' : '') + '</div>');
    return;
  }
  let m = '✓ 환불 완료: ' + won(r.data.refundAmount) + ' · 크레딧 -' + r.data.deductedCredits + 'p (잔여 ' + r.data.credits + 'p)';
  if (r.data.warning) m = '⚠️ ' + r.data.warning;
  item.insertAdjacentHTML('beforeend', '<div class="msg ok">' + escapeHtml(m) + '</div>');
  setTimeout(() => { openPayments($('payModal').dataset.uid, $('payModal').dataset.email); loadMembers(); }, 1300);
}

// ===== 비밀번호 변경 =====
async function changePw() {
  const cur = $('curPw').value, np = $('newPw').value, np2 = $('newPw2').value;
  if (!cur || !np) { setMsg($('pwMsg'), '현재/새 비밀번호를 입력하세요', 'err'); return; }
  if (np.length < 8) { setMsg($('pwMsg'), '새 비밀번호는 8자 이상이어야 해요', 'err'); return; }
  if (np !== np2) { setMsg($('pwMsg'), '새 비밀번호 확인이 일치하지 않아요', 'err'); return; }
  $('pwBtn').disabled = true; setMsg($('pwMsg'), '변경 중…');
  const r = await api('/admin/change-password', { method: 'POST', body: JSON.stringify({ currentPassword: cur, newPassword: np }) });
  $('pwBtn').disabled = false;
  if (r.status === 401 && r.data.error === 'admin_auth_required') { logout(); return; }
  if (!r.ok || !r.data.ok) { setMsg($('pwMsg'), r.data.message || '변경 실패', 'err'); return; }
  if (r.data.token) { TOKEN = r.data.token; sessionStorage.setItem(TOKEN_KEY, TOKEN); }
  $('curPw').value = ''; $('newPw').value = ''; $('newPw2').value = '';
  setMsg($('pwMsg'), '✓ 비밀번호가 변경되었어요', 'ok');
}

$('username').addEventListener('keydown', e => { if (e.key === 'Enter') $('password').focus(); });

// ===== 탭 전환 =====
function switchTab(name) {
  document.querySelectorAll('.tab').forEach(b => b.classList.toggle('active', b.getAttribute('data-tab') === name));
  document.querySelectorAll('.tab-panel').forEach(p => p.classList.toggle('active', p.getAttribute('data-panel') === name));
  if (name === 'sales') loadSales();
}
document.querySelectorAll('.tab').forEach(b => b.addEventListener('click', () => switchTab(b.getAttribute('data-tab'))));

// ===== 매출 =====
function todayKST() {
  // 브라우저 TZ와 무관하게 KST 기준 YYYY-MM-DD
  return new Date().toLocaleDateString('en-CA', { timeZone: 'Asia/Seoul' });
}
function shiftKST(days) {
  // 오늘(KST)에서 days만큼 더한 YYYY-MM-DD
  const today = todayKST();
  const t = new Date(today + 'T00:00:00+09:00');
  t.setUTCDate(t.getUTCDate() + days);
  return t.toLocaleDateString('en-CA', { timeZone: 'Asia/Seoul' });
}
function setSalesRange(from, to) {
  $('salesFrom').value = from; $('salesTo').value = to;
}
async function loadSales() {
  if (!$('salesFrom').value) $('salesFrom').value = todayKST();
  if (!$('salesTo').value) $('salesTo').value = todayKST();
  let from = $('salesFrom').value, to = $('salesTo').value;
  if (from > to) { const t = from; from = to; to = t; setSalesRange(from, to); }
  $('salesRows').innerHTML = '<tr><td colspan="6" style="color:var(--dim)">조회 중…</td></tr>';
  $('salesSummary').innerHTML = '';
  setMsg($('salesMsg'), '');
  const r = await api('/admin/sales?from=' + encodeURIComponent(from) + '&to=' + encodeURIComponent(to));
  if (r.status === 401) { logout(); return; }
  if (!r.ok || !r.data.ok) { setMsg($('salesMsg'), (r.data && r.data.message) || '매출 조회 실패', 'err'); $('salesRows').innerHTML = ''; return; }
  renderSales(r.data);
}
function renderSales(d) {
  $('salesSummary').innerHTML =
    '<span>건수 <b>' + d.count + '</b></span>'
    + '<span>총 결제 <b style="color:var(--accent)">' + won(d.gross) + '</b></span>'
    + '<span>환불 <b style="color:var(--danger)">' + won(d.refunded) + '</b></span>'
    + '<span>순매출 <b>' + won(d.net) + '</b></span>';
  const rows = d.payments || [];
  if (!rows.length) { $('salesRows').innerHTML = '<tr><td colspan="6" style="color:var(--dim)">해당 기간에 결제가 없어요</td></tr>'; return; }
  $('salesRows').innerHTML = rows.map(p => {
    const dt = p.createdAt ? new Date(p.createdAt) : null;
    const day = dt ? dt.toLocaleDateString('en-CA', { timeZone: 'Asia/Seoul' }) : '-';
    const time = dt ? dt.toLocaleTimeString('ko-KR', { timeZone: 'Asia/Seoul', hour12: false, hour: '2-digit', minute: '2-digit' }) : '-';
    const statusCls = p.status === 'refunded' ? 'refunded' : (p.status === 'partial_refunded' ? 'partial_refunded' : 'completed');
    const statusText = p.status === 'refunded' ? '환불' : (p.status === 'partial_refunded' ? '부분환불' : '완료');
    const refundText = p.refundedAmount ? ' <span style="color:var(--danger);font-size:11px;">(-' + won(p.refundedAmount) + ')</span>' : '';
    return '<tr>'
      + '<td>' + day + '</td>'
      + '<td>' + time + '</td>'
      + '<td><div class="email">' + escapeHtml(p.email || '(이메일 없음)') + '</div><div class="sub">' + escapeHtml(p.uid || '') + '</div></td>'
      + '<td class="num"><b>' + won(p.amount) + '</b>' + refundText + '</td>'
      + '<td class="num">' + (p.credits || 0) + 'p</td>'
      + '<td><span class="statpill ' + statusCls + '">' + statusText + '</span></td>'
      + '</tr>';
  }).join('');
}
$('loadSalesBtn').addEventListener('click', loadSales);
$('salesFrom').addEventListener('change', loadSales);
$('salesTo').addEventListener('change', loadSales);
$('salesFrom').addEventListener('keydown', e => { if (e.key === 'Enter') loadSales(); });
$('salesTo').addEventListener('keydown', e => { if (e.key === 'Enter') loadSales(); });
$('salesTodayBtn').addEventListener('click', () => { setSalesRange(todayKST(), todayKST()); loadSales(); });
$('sales7Btn').addEventListener('click',  () => { setSalesRange(shiftKST(-6), todayKST()); loadSales(); });
$('sales30Btn').addEventListener('click', () => { setSalesRange(shiftKST(-29), todayKST()); loadSales(); });
setSalesRange(todayKST(), todayKST());

// 시작: 토큰 있으면 대시보드 시도
if (TOKEN) { showDash(); } else { showLogin(); }
